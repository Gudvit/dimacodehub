<div class="route-shell" animate.enter="route-enter" animate.leave="route-leave">
  <app-header></app-header>

  <section class="contact">
    <div class="contact-layout">
      <div class="contact-info">
        <p class="eyebrow">Contact</p>
        <h1>Let’s work together</h1>
        <p class="lead">Cracow, Poland · Remote</p>

        <div class="contact-list">
          <div>
            <span class="label">Phone</span>
            <a href="tel:+48577682299">+48 577 68 22 99</a>
          </div>
          <div>
            <span class="label">Email</span>
            <a href="mailto:gudvitt@gmail.com">gudvitt@gmail.com</a>
          </div>
        </div>

        <div class="socials">
          <a href="#" aria-label="GitHub">

            </svg>
          </a>

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.98 3.5a2.5 2.5 0 1 1-.01 5.01 2.5 2.5 0 0 1 .01-5.01ZM3 9h4v12H3V9Zm7 0h3.8v1.64h.05c.53-1 1.82-2.06 3.75-2.06 4.01 0 4.75 2.7 4.75 6.2V21h-4v-5.2c0-1.24-.02-2.84-1.73-2.84-1.74 0-2 1.36-2 2.75V21h-4V9Z" />

            </svg>

          </a>
        </div>
      </div>

      <form class="message-form" [formGroup]="messageForm" (ngSubmit)="onSubmit()">
        <h2>Send me a message</h2>
        <label>
          <span>Name</span>
          <input type="text" name="name" placeholder="Your name" formControlName="name">
          @if (name?.touched && name?.invalid) {
            <span class="error">Name is required (min 2 characters).</span>
          }
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="you@email.com" formControlName="email">
          @if (email?.touched && email?.invalid) {
            <span class="error">Enter a valid email address.</span>
          }
        </label>
        <label>
          <span>Message</span>
          <textarea name="message" rows="5" placeholder="Tell me about your project" formControlName="message"></textarea>
          @if (message?.touched && message?.invalid) {
            <span class="error">Message is required (min 10 characters).</span>
          }
        </label>
        <button type="submit" [disabled]="messageForm.invalid">Send</button>
        @if (successMessage) {
          <p class="success">{{ successMessage }}</p>
        }
      </form>
    </div>
  </section>

  <app-footer></app-footer>
</div>
