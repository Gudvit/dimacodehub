  <h2 class="contact-section__display-title">LET'S CONNECT</h2>

  <div class="contact-section__layout">
    <article class="contact-intro">
      <h3>Got an idea? Let's build it.</h3>
      <p class="contact-intro__lead">
        I help teams ship reliable Angular products with strong architecture, performance, and delivery quality.
      </p>

      <div class="contact-info-grid">
        <article>
          <span class="key">Phone</span>
          <a href="tel:+48577682299">+48 577 68 22 99</a>
        </article>
        <article>
          <span class="key">Email</span>
          <a href="mailto:gudvitt@gmail.com">gudvitt@gmail.com</a>
        </article>
        <article>
          <span class="key">Location</span>
          <p>Cracow, Poland - Remote</p>
        </article>
      </div>

      <div class="contact-channels" aria-label="Preferred channels">
        <a href="#" aria-label="Open GitHub profile">

        </a>
        <a href="#" aria-label="Open LinkedIn profile">
          <svg viewBox="0 0 24 24" aria-hidden="true">

      </div>
    </article>

    <form class="message-form" [formGroup]="messageForm" (ngSubmit)="onSubmit()">
      <h3>Send a message</h3>

      <label>
        <span>Name</span>
        <input type="text" name="name" placeholder="Your name" formControlName="name">
        @if (name?.touched && name?.invalid) {
          <span class="error">Name is required (min 2 characters).</span>
        }
      </label>

      <label>
        <span>Email</span>
        <input type="email" name="email" placeholder="you@email.com" formControlName="email">
        @if (email?.touched && email?.invalid) {
          <span class="error">Enter a valid email address.</span>
        }
      </label>

      <label>
        <span>Message</span>
        <textarea name="message" rows="5" placeholder="Tell me about your project" formControlName="message"></textarea>
        @if (message?.touched && message?.invalid) {
          <span class="error">Message is required (min 10 characters).</span>
        }
      </label>

      <button type="submit" [disabled]="messageForm.invalid">Send</button>

      @if (successMessage) {
        <p class="success">{{ successMessage }}</p>
      }
    </form>
  </div>

  <app-footer></app-footer>
</section>
