<section class="hero slide-section">
  <app-header></app-header>
  <div class="hero-text">
    <h1 class="name">Dmytro Huliaiev</h1>
    <p class="eyebrow">Frontend Engineer</p>
    <p class="lead">I build systems, not just features</p>
    <div class="hero-actions">
      <a class="primary" href="/cv.pdf" download>
        Download CV
      </a>
      <button class="primary" type="button" (click)="onScrollToContacts()">
        Contact me
      </button>
    </div>
  </div>
  <div
    class="scroll-hint"
    role="button"
    tabindex="0"
    aria-label="Scroll to next section"
    (click)="onScrollNext()"
    (keydown.enter)="onScrollNext()"
    (keydown.space)="onScrollNext()"
  ></div>
</section>
