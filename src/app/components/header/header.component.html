<header class="site-header">
  <a class="brand" routerLink="/" (click)="closeMenu()">
    <img src="images/logo.svg" alt="Logo">
    <span class="brand-name" aria-hidden="true">
      <span class="first">DMYTRO</span>
      <span class="last">HULIAIEV</span>
    </span>
  </a>

  <button
    class="menu-toggle"
    type="button"
    [class.is-open]="menuOpen"
    [attr.aria-expanded]="menuOpen"
    aria-controls="site-nav"
    aria-label="Toggle navigation menu"
    (click)="toggleMenu()"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="nav" id="site-nav" [class.is-open]="menuOpen">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Home</a>
    <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
    <a routerLink="/contacts" routerLinkActive="active" (click)="closeMenu()">Contacts</a>
  </nav>
</header>
